meters:
- name: subscription
  description: Flat monthly plan subscription (Pro $49/mo, Team $500/mo).
  unit: months
  aggregation: sum
  dimensions:
  - account
  - plan
- name: logged_requests
  description: Logged LLM requests (transactions) within the included monthly plan volume.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - workspace
- name: request_overage
  description: Logged requests beyond the included monthly volume, billed per request ($0.003 Pro, $0.002 Team).
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - workspace
- name: eval_cell_executions
  description: Evaluation cell executions consumed running evaluation reports.
  unit: executions
  aggregation: sum
  dimensions:
  - account
  - workspace
- name: dataset_storage
  description: Dataset storage subject to per-plan size caps (10MB/150MB/1GB).
  unit: bytes
  aggregation: max
  dimensions:
  - account
  - workspace
- name: seats
  description: Active user seats counted against per-plan user limits.
  unit: seats
  aggregation: max
  dimensions:
  - account
  - plan
principles:
- name: Visibility
  description: Track monthly logged-request volume and eval executions per workspace against included plan allowances.
- name: Allocation
  description: Use separate workspaces and tags/metadata per team or project; map logged requests to internal cost centers.
- name: Optimization
  description: Stay within included request volume, prune unnecessary logging, and batch evaluation runs to control eval cell execution spend; right-size the plan to actual request volume.
- name: Accountability
  description: Assign workspace owners; review monthly subscription, overage, and eval spend against budget.
