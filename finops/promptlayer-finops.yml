description: >-
  FinOps view of PromptLayer spend. PromptLayer bills a flat monthly
  subscription per paid plan (Pro, Team) plus pay-as-you-go overage per logged
  request (transaction) above the included monthly volume, with additional
  metered allowances for evaluation cell executions and dataset storage caps.
  Enterprise is a custom contract. Cost is driven by logged request volume,
  evaluation runs, and seat count rather than per-token inference, which is paid
  to the underlying LLM providers separately.
notes: >-
  Subscription prices and overage rates are subject to change; verify against the
  PromptLayer pricing page during reconciliation. LLM provider inference costs
  are billed by the providers (OpenAI, Anthropic, etc.), not by PromptLayer.
